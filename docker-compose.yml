services:
  backend:
    image: ghcr.io/themestroyer/studytest-backend:latest
    restart: unless-stopped
    environment:
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      PORT: 4000
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
    volumes:
      - ./data:/app/data
    expose:
      - "4000"

  frontend:
    image: ghcr.io/themestroyer/studytest-frontend:latest
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:${APP_PORT:-8081}:80"
